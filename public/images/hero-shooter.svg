<svg viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="g" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0L0 0 0 30" fill="none" stroke="#F5F5F5" stroke-width="0.4" opacity="0.04"/>
    </pattern>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2E2E32"/>
      <stop offset="100%" stop-color="#252527"/>
    </linearGradient>
    <linearGradient id="legGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#28282B"/>
      <stop offset="100%" stop-color="#222224"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="400" fill="#1A1A1C"/>
  <rect width="300" height="400" fill="url(#g)"/>

  <!-- Diagonal red accent lines -->
  <line x1="-30" y1="400" x2="400" y2="-30" stroke="#D32F3A" stroke-width="1.5" opacity="0.07"/>
  <line x1="-60" y1="400" x2="370" y2="-60" stroke="#D32F3A" stroke-width="0.8" opacity="0.04"/>

  <!-- ── GROUND SHADOW ── -->
  <ellipse cx="170" cy="385" rx="90" ry="9" fill="#0F0F10" opacity="0.9"/>

  <!-- ── BOOTS ── -->
  <!-- Back boot (right) -->
  <rect x="190" y="350" width="46" height="20" rx="5" fill="#17171A"/>
  <rect x="190" y="350" width="46" height="8" rx="3" fill="#1E1E21"/>
  <!-- Front boot (left) -->
  <rect x="118" y="358" width="54" height="20" rx="5" fill="#1C1C1F"/>
  <rect x="118" y="358" width="54" height="8" rx="3" fill="#232326"/>
  <!-- Boot sole accent -->
  <rect x="118" y="374" width="54" height="4" rx="2" fill="#D32F3A" opacity="0.4"/>

  <!-- ── LEGS ── -->
  <!-- Back leg (right) -->
  <polygon points="215,228 240,228 236,354 194,354" fill="url(#legGrad)"/>
  <!-- Front leg (left) -->
  <polygon points="155,228 185,228 175,362 120,362" fill="#2A2A2D"/>
  <!-- Front knee armor -->
  <rect x="138" y="292" width="36" height="18" rx="4" fill="#333337"/>
  <rect x="140" y="294" width="32" height="6" rx="2" fill="#D32F3A" opacity="0.5"/>

  <!-- ── BELT ── -->
  <rect x="148" y="219" width="100" height="13" rx="3" fill="#D32F3A"/>
  <rect x="187" y="220" width="24" height="11" rx="2" fill="#A02029"/>
  <!-- Belt buckle center -->
  <rect x="195" y="223" width="8" height="5" rx="1" fill="#C02535"/>

  <!-- Holster (right hip) -->
  <rect x="232" y="232" width="20" height="42" rx="4" fill="#1A1A1D"/>
  <rect x="234" y="234" width="16" height="10" rx="2" fill="#141416"/>
  <rect x="234" y="248" width="16" height="3" rx="1" fill="#D32F3A" opacity="0.6"/>

  <!-- ── TORSO / TACTICAL VEST ── -->
  <polygon points="148,148 252,148 252,226 148,226" fill="url(#bodyGrad)"/>
  <!-- Vest shoulder pads -->
  <rect x="144" y="148" width="26" height="30" rx="3" fill="#323236"/>
  <rect x="232" y="148" width="24" height="30" rx="3" fill="#2C2C30"/>
  <!-- Center panel (plate carrier) -->
  <rect x="168" y="156" width="66" height="60" rx="2" fill="#252528"/>
  <!-- MOLLE webbing -->
  <rect x="170" y="160" width="62" height="4" rx="1" fill="#2E2E32"/>
  <rect x="170" y="168" width="62" height="4" rx="1" fill="#2E2E32"/>
  <rect x="170" y="176" width="62" height="4" rx="1" fill="#2E2E32"/>
  <!-- Red patch -->
  <rect x="170" y="184" width="62" height="26" rx="2" fill="#D32F3A"/>
  <text x="201" y="200" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#F5F5F5" text-anchor="middle" letter-spacing="1.5">R U READY</text>
  <text x="201" y="207" font-family="Arial,sans-serif" font-size="6" fill="#F5F5F5" text-anchor="middle" opacity="0.7" letter-spacing="0.5">ACTION AIR</text>
  <!-- Mag pouches (left side of vest) -->
  <rect x="148" y="170" width="16" height="28" rx="3" fill="#202023"/>
  <rect x="150" y="172" width="12" height="4" rx="1" fill="#D32F3A" opacity="0.5"/>
  <rect x="148" y="202" width="16" height="24" rx="3" fill="#202023"/>
  <rect x="150" y="204" width="12" height="4" rx="1" fill="#D32F3A" opacity="0.5"/>

  <!-- ── COLLAR ── -->
  <rect x="182" y="140" width="38" height="12" rx="3" fill="#2C2C30"/>

  <!-- ── NECK ── -->
  <rect x="190" y="122" width="22" height="22" rx="6" fill="#3D3830"/>

  <!-- ── HEAD ── -->
  <!-- Head base (skin/balaclava) -->
  <ellipse cx="204" cy="100" rx="32" ry="35" fill="#35302A"/>

  <!-- Tactical cap body -->
  <rect x="172" y="72" width="66" height="22" rx="4" fill="#252528"/>
  <ellipse cx="205" cy="72" rx="34" ry="11" fill="#2B2B2E"/>
  <!-- Cap bill (pointing left toward target) -->
  <polygon points="172,82 118,88 118,79 172,73" fill="#202023"/>
  <!-- Cap logo (small R) -->
  <text x="205" y="87" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#D32F3A" text-anchor="middle">RUR</text>

  <!-- Ear protection / hearing muff (left ear, facing viewer) -->
  <ellipse cx="173" cy="100" rx="12" ry="16" fill="#D32F3A"/>
  <ellipse cx="173" cy="100" rx="7" ry="10" fill="#A02029"/>
  <ellipse cx="173" cy="100" rx="3" ry="4" fill="#C02535"/>
  <!-- Ear pro strap goes over cap -->
  <path d="M173,85 Q190,70 205,72" stroke="#C02535" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Shooting glasses -->
  <rect x="173" y="93" width="50" height="14" rx="5" fill="#0A1520" opacity="0.95"/>
  <!-- Lens tint -->
  <rect x="175" y="95" width="46" height="10" rx="4" fill="#112233" opacity="0.8"/>
  <!-- Lens highlight -->
  <polygon points="178,96 194,96 180,103" fill="#F5F5F5" opacity="0.1"/>
  <polygon points="220,96 226,96 220,101" fill="#F5F5F5" opacity="0.08"/>
  <!-- Red dot reflection in glasses -->
  <circle cx="185" cy="99" r="2" fill="#D32F3A" opacity="0.3"/>

  <!-- Chin/jaw -->
  <ellipse cx="204" cy="128" rx="20" ry="7" fill="#2E2924"/>

  <!-- ── ARMS ── -->
  <!-- Right arm (back, resting at side) -->
  <polygon points="248,155 262,155 264,228 248,228" fill="#222225"/>

  <!-- Left arm - upper arm (shoulder to elbow going forward-left) -->
  <polygon points="152,160 152,185 95,200 98,172" fill="#28282C"/>
  <!-- Left arm - forearm (elbow to hands) -->
  <polygon points="98,172 95,200 42,210 46,183" fill="#252528"/>

  <!-- Gloves -->
  <rect x="28" y="181" width="24" height="30" rx="5" fill="#1A1A1D"/>
  <!-- Thumb -->
  <rect x="23" y="188" width="9" height="18" rx="4" fill="#1C1C1F"/>
  <!-- Knuckle highlights -->
  <rect x="30" y="182" width="20" height="3" rx="1" fill="#252528"/>

  <!-- ── PISTOL ── -->
  <!-- Grip -->
  <polygon points="46,199 58,199 64,228 52,228" fill="#111113"/>
  <!-- Frame body -->
  <rect x="-5" y="190" width="60" height="22" rx="3" fill="#141416"/>
  <!-- Slide -->
  <rect x="-5" y="183" width="55" height="13" rx="2" fill="#1E1E21"/>
  <!-- Slide serrations -->
  <rect x="32" y="184" width="2.5" height="11" fill="#282828"/>
  <rect x="37" y="184" width="2.5" height="11" fill="#282828"/>
  <rect x="42" y="184" width="2.5" height="11" fill="#282828"/>
  <!-- Compensator / barrel -->
  <rect x="-20" y="192" width="18" height="10" rx="2" fill="#1A1A1D"/>
  <!-- Barrel hole -->
  <circle cx="-15" cy="197" r="3" fill="#0F0F10"/>
  <!-- Trigger guard -->
  <path d="M 43 207 Q 54 220 43 230" stroke="#1E1E21" stroke-width="3.5" fill="none"/>
  <!-- Trigger -->
  <rect x="40" y="210" width="4" height="10" rx="2" fill="#2A2A2D"/>
  <!-- Red dot optic -->
  <rect x="8" y="179" width="22" height="7" rx="2" fill="#D32F3A"/>
  <rect x="10" y="180" width="18" height="5" rx="1" fill="#A02029"/>
  <!-- Red dot reticle glow -->
  <circle cx="19" cy="182" r="2" fill="#FF3A3A" opacity="0.9"/>
  <!-- Front sight -->
  <rect x="-3" y="180" width="5" height="5" rx="1" fill="#2E2E32"/>

  <!-- Laser dot (subtle) -->
  <circle cx="-40" cy="197" r="2" fill="#D32F3A" opacity="0.6"/>
  <line x1="-20" y1="197" x2="-38" y2="197" stroke="#D32F3A" stroke-width="0.8" opacity="0.25"/>

  <!-- ── STAGE BADGE ── -->
  <rect x="234" y="328" width="55" height="44" rx="3" fill="#D32F3A" opacity="0.92"/>
  <text x="261" y="346" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#F5F5F5" text-anchor="middle" letter-spacing="2">STAGE</text>
  <text x="261" y="366" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="#F5F5F5" text-anchor="middle">01</text>

  <!-- ── IPSC TARGET (bg, faint) ── -->
  <g opacity="0.05" transform="translate(240,60)">
    <rect x="0" y="0" width="36" height="52" rx="3" fill="#F5F5F5"/>
    <ellipse cx="18" cy="12" rx="11" ry="13" fill="#D32F3A"/>
  </g>

  <!-- ── CORNER ACCENTS (matching site design) ── -->
  <line x1="0" y1="0" x2="28" y2="0" stroke="#D32F3A" stroke-width="2"/>
  <line x1="0" y1="0" x2="0" y2="28" stroke="#D32F3A" stroke-width="2"/>
  <line x1="300" y1="400" x2="272" y2="400" stroke="#D32F3A" stroke-width="2"/>
  <line x1="300" y1="400" x2="300" y2="372" stroke="#D32F3A" stroke-width="2"/>
</svg>

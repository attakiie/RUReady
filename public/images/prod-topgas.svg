<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cylBody" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#181819"/>
      <stop offset="25%" stop-color="#252528"/>
      <stop offset="60%" stop-color="#222225"/>
      <stop offset="100%" stop-color="#111113"/>
    </linearGradient>
    <linearGradient id="cylSheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F5F5F5" stop-opacity="0.09"/>
      <stop offset="50%" stop-color="#F5F5F5" stop-opacity="0.01"/>
      <stop offset="100%" stop-color="#F5F5F5" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid3" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0L0 0 0 30" fill="none" stroke="#F5F5F5" stroke-width="0.4" opacity="0.04"/>
    </pattern>
  </defs>

  <rect width="400" height="400" fill="#0F0F10"/>
  <rect width="400" height="400" fill="url(#grid3)"/>

  <!-- Shadow -->
  <ellipse cx="200" cy="378" rx="72" ry="8" fill="#000" opacity="0.75"/>

  <!-- ── MAIN CYLINDER (wider, industrial) ── -->
  <rect x="130" y="95" width="140" height="274" fill="url(#cylBody)"/>
  <!-- Ellipse caps -->
  <ellipse cx="200" cy="95" rx="70" ry="17" fill="#1E1E21"/>
  <ellipse cx="200" cy="369" rx="70" ry="15" fill="#111113"/>
  <!-- Bottom base ring -->
  <ellipse cx="200" cy="362" rx="70" ry="10" fill="#1C1C1F"/>
  <!-- Base foot ring (industrial look) -->
  <rect x="122" y="358" width="156" height="14" rx="3" fill="#1A1A1D"/>
  <ellipse cx="200" cy="372" rx="78" ry="6" fill="#141416"/>

  <!-- Sheen -->
  <rect x="130" y="95" width="28" height="274" fill="url(#cylSheen)"/>

  <!-- ── SHOULDER / NECK TAPER ── -->
  <polygon points="130,95 154,55 246,55 270,95" fill="#1A1A1D"/>
  <ellipse cx="200" cy="95" rx="70" ry="17" fill="#1E1E21"/>
  <ellipse cx="200" cy="55" rx="46" ry="12" fill="#252528"/>

  <!-- ── VALVE ASSEMBLY (industrial) ── -->
  <!-- Valve collar ring -->
  <rect x="170" y="36" width="60" height="22" rx="5" fill="#2A2A2D"/>
  <!-- Valve body -->
  <rect x="178" y="18" width="44" height="22" rx="5" fill="#303034"/>
  <!-- Main valve handle (T-bar) -->
  <rect x="162" y="14" width="76" height="8" rx="4" fill="#383840"/>
  <!-- Handle caps -->
  <rect x="160" y="11" width="12" height="14" rx="3" fill="#404048"/>
  <rect x="228" y="11" width="12" height="14" rx="3" fill="#404048"/>
  <!-- Pressure gauge (circle on valve) -->
  <circle cx="200" cy="28" r="9" fill="#1A1A1D"/>
  <circle cx="200" cy="28" r="7" fill="#0F0F10"/>
  <circle cx="200" cy="28" r="5" fill="#111115"/>
  <!-- Gauge needle -->
  <line x1="200" y1="28" x2="203" y2="23" stroke="#D32F3A" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Gauge marks -->
  <circle cx="200" cy="22" r="1" fill="#F5F5F5" opacity="0.4"/>
  <!-- Warning sticker on valve -->
  <rect x="168" y="36" width="16" height="12" rx="1" fill="#D32F3A"/>
  <text x="176" y="45" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#F5F5F5" text-anchor="middle">!</text>

  <!-- ── HORIZONTAL BANDING (industrial) ── -->
  <rect x="130" y="100" width="140" height="6" fill="#1E1E21"/>
  <rect x="130" y="110" width="140" height="3" fill="#D32F3A" opacity="0.15"/>
  <rect x="130" y="347" width="140" height="6" fill="#1A1A1D"/>

  <!-- ── WARNING STRIPE BAND ── -->
  <!-- Diagonal stripe pattern on lower portion -->
  <clipPath id="cylClip">
    <rect x="130" y="300" width="140" height="46"/>
  </clipPath>
  <g clip-path="url(#cylClip)" opacity="0.15">
    <line x1="100" y1="346" x2="180" y2="300" stroke="#D32F3A" stroke-width="8"/>
    <line x1="130" y1="346" x2="210" y2="300" stroke="#D32F3A" stroke-width="8"/>
    <line x1="160" y1="346" x2="240" y2="300" stroke="#D32F3A" stroke-width="8"/>
    <line x1="190" y1="346" x2="270" y2="300" stroke="#D32F3A" stroke-width="8"/>
    <line x1="220" y1="346" x2="300" y2="300" stroke="#D32F3A" stroke-width="8"/>
  </g>
  <rect x="130" y="300" width="140" height="2" fill="#D32F3A" opacity="0.3"/>

  <!-- ── LABEL AREA ── -->
  <rect x="130" y="130" width="140" height="158" fill="#1D1D20"/>
  <rect x="130" y="128" width="140" height="4" fill="#D32F3A" opacity="0.6"/>
  <rect x="130" y="286" width="140" height="4" fill="#D32F3A" opacity="0.3"/>

  <!-- Label: Brand -->
  <text x="200" y="158" font-family="Arial Black,Arial,sans-serif" font-size="10" font-weight="900" fill="#D32F3A" text-anchor="middle" letter-spacing="3">R U READY</text>
  <rect x="158" y="163" width="84" height="1" fill="#D32F3A" opacity="0.3"/>

  <!-- Label: Product name -->
  <text x="200" y="190" font-family="Arial Black,Arial,sans-serif" font-size="28" font-weight="900" fill="#F5F5F5" text-anchor="middle" letter-spacing="0">TOP GAS</text>
  <!-- Weight badge -->
  <rect x="160" y="198" width="80" height="28" rx="3" fill="#D32F3A"/>
  <text x="200" y="217" font-family="Arial Black,Arial,sans-serif" font-size="18" font-weight="900" fill="#F5F5F5" text-anchor="middle" letter-spacing="1">12 KG</text>

  <!-- Divider -->
  <rect x="148" y="232" width="104" height="1" fill="#F5F5F5" opacity="0.1"/>

  <!-- Spec lines -->
  <text x="200" y="250" font-family="Arial,sans-serif" font-size="8.5" fill="#F5F5F5" text-anchor="middle" letter-spacing="1.5" opacity="0.7">HIGH VOLUME REFILL</text>
  <text x="200" y="265" font-family="Arial,sans-serif" font-size="8" fill="#F5F5F5" text-anchor="middle" opacity="0.5">FOR FIELD USE &amp; REFILLING</text>
  <!-- Pressure spec -->
  <rect x="150" y="272" width="100" height="18" rx="2" fill="#111113" opacity="0.5"/>
  <text x="200" y="284" font-family="Arial,sans-serif" font-size="8" fill="#D32F3A" text-anchor="middle" letter-spacing="0.5" font-weight="bold">MAX 150 PSI · FLAMMABLE</text>
</svg>
